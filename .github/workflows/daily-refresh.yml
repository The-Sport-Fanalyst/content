name: Daily board refresh

# Refreshes the website's community board once a day by triggering a Netlify
# build. The board reads live GitHub Discussions at build time, so a daily build
# keeps the listing current. Conversations on GitHub are live immediately; only
# the board's *listing* waits for this daily refresh.
#
# Cost: one Netlify build per day (~30/month), well within the free tier.
#
# Setup (one time):
#   1. In Netlify: Site configuration → Build & deploy → Build hooks →
#      "Add build hook". Copy the URL it gives you.
#   2. In THIS repo: Settings → Secrets and variables → Actions → New repository
#      secret named NETLIFY_BUILD_HOOK, paste the URL.

on:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC daily — adjust if you like
  workflow_dispatch: {}  # lets you trigger a refresh manually from the Actions tab

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Netlify build hook
        run: |
          if [ -z "${{ secrets.NETLIFY_BUILD_HOOK }}" ]; then
            echo "NETLIFY_BUILD_HOOK secret is not set — see this file's setup notes."
            exit 1
          fi
          curl -fsS -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK }}"
          echo "Triggered a Netlify rebuild."