name: Auto-create collaborator discussions

# When a project marked "Seeking collaborators" lands on main, open a matching
# discussion in the Open Projects category (once per project). This makes the
# "looking for collaborators" link on the site point at a real, ready thread.

on:
  push:
    branches: [main]
    paths:
      - 'projects/**.md'
  workflow_dispatch: # allow manual runs to backfill existing projects

permissions:
  contents: read
  discussions: write

jobs:
  collaborator-discussions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create discussions for seeking-collaborators projects
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // --- config: which category discussions go into ---
            const CATEGORY_NAME = 'Open Projects';
            const MARKER = '<!-- auto:collab '; // used to find/avoid duplicates

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1. Resolve the repo's GraphQL node id + the Open Projects category id.
            const repoData = await github.graphql(`
              query($owner:String!, $repo:String!) {
                repository(owner:$owner, name:$repo) {
                  id
                  discussionCategories(first:25) { nodes { id name } }
                }
              }`, { owner, repo });

            const repoId = repoData.repository.id;
            const category = repoData.repository.discussionCategories.nodes
              .find(c => c.name === CATEGORY_NAME);
            if (!category) {
              core.setFailed(`Discussion category "${CATEGORY_NAME}" not found. ` +
                `Create it in repo Settings → Discussions, or edit CATEGORY_NAME.`);
              return;
            }

            // 2. Read all project files, pick the ones seeking collaborators.
            const dir = 'projects';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.md') && f !== 'README.md');

            function frontmatter(text) {
              const m = text.match(/^---\n([\s\S]*?)\n---/);
              if (!m) return {};
              const fm = {};
              for (const line of m[1].split('\n')) {
                const i = line.indexOf(':');
                if (i === -1) continue;
                const key = line.slice(0, i).trim();
                let val = line.slice(i + 1).trim().replace(/^["']|["']$/g, '');
                fm[key] = val;
              }
              return fm;
            }

            const seeking = [];
            for (const f of files) {
              const text = fs.readFileSync(path.join(dir, f), 'utf8');
              const fm = frontmatter(text);
              if (fm.status === 'Seeking collaborators') {
                seeking.push({ slug: f.replace(/\.md$/, ''), fm });
              }
            }
            core.info(`Found ${seeking.length} project(s) seeking collaborators.`);

            // 3. List existing auto-created discussions so we don't duplicate.
            const existing = await github.graphql(`
              query($owner:String!, $repo:String!) {
                repository(owner:$owner, name:$repo) {
                  discussions(first:100, categoryId:null) {
                    nodes { title body }
                  }
                }
              }`, { owner, repo });
            const existingBodies = existing.repository.discussions.nodes.map(d => d.body || '');

            // 4. Create one discussion per project that doesn't already have one.
            let created = 0;
            for (const p of seeking) {
              const marker = `${MARKER}${p.slug} -->`;
              if (existingBodies.some(b => b.includes(marker))) {
                core.info(`Skip ${p.slug} — discussion already exists.`);
                continue;
              }
              const title = `Collaborators wanted: ${p.fm.title || p.slug}`;
              const body = [
                marker,
                `**Project:** ${p.fm.title || p.slug}`,
                p.fm.sport ? `**Sport:** ${p.fm.sport}` : '',
                p.fm.category ? `**Category:** ${p.fm.category}` : '',
                '',
                p.fm.description || '',
                '',
                p.fm.github_url ? `Repo: ${p.fm.github_url}` : '',
                '',
                `This project is looking for collaborators. Reply here if you'd like to help.`,
              ].filter(Boolean).join('\n');

              await github.graphql(`
                mutation($repoId:ID!, $categoryId:ID!, $title:String!, $body:String!) {
                  createDiscussion(input:{
                    repositoryId:$repoId, categoryId:$categoryId, title:$title, body:$body
                  }) { discussion { number url } }
                }`, { repoId, categoryId: category.id, title, body });

              created++;
              core.info(`Created discussion for ${p.slug}.`);
            }

            core.info(`Done. Created ${created} new discussion(s).`);